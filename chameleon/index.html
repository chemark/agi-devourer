<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舌尖上的 AGI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景音乐：默认静音，第一次用户交互后自动播放（浏览器自播策略限制） -->
    <audio id="bgm" src="assets/bgm.mp3" loop preload="auto" style="display:none;"></audio>
    <!-- 飘动云彩层 -->
    <div id="cloud-layer"></div>
    <div id="game-container">
        <!-- 背景层 -->
        <div id="bg"></div>
        
        <!-- 游戏画布（舌头、苍蝇、UI） -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- 变色龙前景色 -->
        <img id="chameleon" src="assets/chameleon.png" alt="Chameleon">
        <div id="agi-tattoo">AGI</div>
        
        <!-- UI 层 -->
        <div id="ui-layer">
            <div id="score-board">算力融合进度: <span id="score" style="color:#00f0ff">0</span> <span style="font-size:24px; color:#aaa">/ 4000 AGI</span></div>
            <div id="time-board">倒计时: <span id="time">60</span>s</div>
            <div id="stomach">
                <div>已吃奇葩配方：</div>
                <div id="stomach-items"></div>
            </div>
            <div id="message-overlay" class="hidden">
                <h2 id="gemini-message"></h2>
                <div id="gemini-score"></div>
                <p id="continue-hint" style="margin-top:24px; font-size:20px; color:rgba(255,255,255,0.6); letter-spacing:2px; animation: pulse 1.2s ease-in-out infinite;">按空格 / 点击任意位置 &nbsp;→&nbsp; 继续捕坎</p>
                <div id="ai-story" style="
                    margin:18px auto 0; max-width:600px;
                    font-size:18px; line-height:1.7; color:rgba(255,255,255,0.88);
                    background:rgba(255,255,255,0.08); border-radius:12px;
                    padding:14px 20px; min-height:52px;
                    font-family:'ZCOOL KuaiLe',cursive;
                "></div>
                <button id="restart-btn" class="hidden" style="display:none;">重新开始</button>
            </div>
            
            <div id="start-screen">
                <h1>舌尖上的 AGI</h1>
                <p style="font-size:16px; color:rgba(255,255,255,0.5); letter-spacing:1px; margin-top:-10px; margin-bottom:24px;">A Tongue-Tip AGI Adventure</p>

                <!-- 三步指引卡片 -->
                <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:20px; flex-wrap:wrap;">
                    <div style="background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.12); border-radius:14px; padding:16px 20px; width:110px; text-align:center;">
                        <div style="font-size:32px; margin-bottom:6px;">🖱️</div>
                        <div style="font-weight:bold; font-size:14px; color:#a8ff78; margin-bottom:4px;">移动鼠标</div>
                        <div style="font-size:12px; color:rgba(255,255,255,0.55); line-height:1.4;">瞄准天上的大模型</div>
                    </div>
                    <div style="color:rgba(255,255,255,0.3); font-size:20px;">→</div>
                    <div style="background:rgba(0,0,0,0.55); border:1px solid rgba(168,255,120,0.3); border-radius:14px; padding:16px 20px; width:110px; text-align:center;">
                        <div style="font-size:32px; margin-bottom:6px; background:rgba(168,255,120,0.15); border-radius:8px; padding:2px;">空格</div>
                        <div style="font-weight:bold; font-size:14px; color:#a8ff78; margin-bottom:4px;">按下空格</div>
                        <div style="font-size:12px; color:rgba(255,255,255,0.55); line-height:1.4;">射出变异舌头</div>
                    </div>
                    <div style="color:rgba(255,255,255,0.3); font-size:20px;">→</div>
                    <div style="background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.12); border-radius:14px; padding:16px 20px; width:110px; text-align:center;">
                        <div style="font-size:32px; margin-bottom:6px;">🏆</div>
                        <div style="font-weight:bold; font-size:14px; color:#a8ff78; margin-bottom:4px;">60 秒内</div>
                        <div style="font-size:12px; color:rgba(255,255,255,0.55); line-height:1.4;">积累 4000 点算力</div>
                    </div>
                </div>

                <!-- 三连提示 -->
                <div style="background:rgba(255,220,80,0.12); border:1px solid rgba(255,220,80,0.35); border-radius:12px; padding:12px 24px; margin-bottom:24px; font-size:15px; color:rgba(255,255,255,0.85); text-align:center;">
                    💡 连续吃下 3 个模型触发「⚡ 三连」爆炸变身，得分翻倍！
                </div>

                <button id="start-btn">开始游戏</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
